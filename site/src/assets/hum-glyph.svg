<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring — instrument bezel. -->
  <circle cx="32" cy="32" r="28" stroke="#ffb347" stroke-width="1.2" opacity="0.5"/>
  <!-- Inner ring — softer hum band. -->
  <circle cx="32" cy="32" r="20" stroke="#ffd28e" stroke-width="0.8" opacity="0.35"/>
  <!-- Three concentric arcs ≈ "hum lines". -->
  <path d="M 12 32 Q 32 24 52 32" stroke="#ffd28e" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 14 36 Q 32 28 50 36" stroke="#ffb347" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 16 40 Q 32 32 48 40" stroke="#ffb347" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Center pip — the sigil. -->
  <circle cx="32" cy="32" r="1.6" fill="#ffd28e"/>
</svg>
