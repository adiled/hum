name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Source-only GitHub release. Per-platform binary builds were dropped
  # in 0.31 — the x86_64-apple-darwin leg kept hanging, blocking the
  # whole release. Reintroduce when there's a reliable cross-platform
  # path; for now consumers build from source via `cargo install` or
  # the installer at hum.sh.
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compose release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Prefer an annotated-tag message; else fall back to changelog
          # since the previous tag.
          BODY=$(git for-each-ref "refs/tags/$TAG" --format='%(contents)' 2>/dev/null)
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
            BODY=$(git log --pretty=format:"- %s" ${PREV}..${TAG} 2>/dev/null || echo "Release $TAG")
          fi
          {
            echo "tag=$TAG"
            echo 'body<<EOF'
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          gh release create "${{ steps.notes.outputs.tag }}" \
            --title "${{ steps.notes.outputs.tag }}" \
            --notes "${{ steps.notes.outputs.body }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
