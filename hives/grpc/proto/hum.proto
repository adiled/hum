syntax = "proto3";

package hum;

// Bidirectional tone stream — one RPC, every chi flows through.
//
// Client opens Stream, sends tones (prompt, cancel, tool-result, ...).
// Server (this bee) bridges to humd over thrum and pumps tones back
// (chunk, finish, tool-call, pulse, breath, ...).
//
// Payload stays opaque on the wire: each Tone carries its full JSON shape
// in `body`. Routing fields (sid, chi) are pulled out so the bridge can
// multiplex without parsing the body for every tone.
service Hum {
  rpc Stream(stream Tone) returns (stream Tone);
}

message Tone {
  string chi  = 1;   // tone kind — "prompt", "chunk", "finish", "tool-call", ...
  string sid  = 2;   // hum session id — multiplex key
  string rid  = 3;   // request id — correlation across echo / response
  bytes  body = 4;   // JSON-encoded full tone (sender writes, receiver parses)
}
